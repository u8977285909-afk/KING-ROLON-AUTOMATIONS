<!doctype html>
<html lang="{{ lang if lang is defined and lang else 'es' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}Acceso | KING ROLON AUTOMATIONS{% endblock %}
    </title>

    <!-- GLOBAL -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- AUTH -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />

    {% block head %}{% endblock %}
  </head>

  <body class="kr-body kr-page-auth">
    <main class="kr-auth-main">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="kr-auth-flashes" role="status" aria-live="polite">
        <div class="kr-auth-flashes-inner">
          {% for category, message in messages %}
          <div class="kr-flash kr-flash-{{ category|e }}">{{ message }}</div>
          {% endfor %}
        </div>
      </div>
      {% endif %} {% endwith %}

      <noscript>
        <div class="kr-auth-noscript">
          <div class="kr-alert kr-alert-warn">
            Activa JavaScript para ver la experiencia completa.
          </div>
        </div>
      </noscript>

      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
